name: Life Planner - reviews & sync

on:
  schedule:
    - cron: "0 5 * * *"      # ~06:00 London: daily Google Tasks sync (+ monthly on the 1st)
    - cron: "0 17 * * 0"     # Sunday ~18:00 London: weekly review
    - cron: "30 20 * * *"    # ~21:30 London: nightly day-review from her replies
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      TZ: Europe/London
      WHATSAPP_TOKEN: ${{ secrets.WHATSAPP_TOKEN }}
      PHONE_NUMBER_ID: ${{ secrets.PHONE_NUMBER_ID }}
      MY_NUMBER: ${{ secrets.MY_NUMBER }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GDRIVE_OAUTH_JSON: ${{ secrets.GDRIVE_OAUTH_JSON }}
      GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
      VAULT_DRIVE_FOLDER_ID: ${{ secrets.VAULT_DRIVE_FOLDER_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python scripts/cron_dispatch.py
