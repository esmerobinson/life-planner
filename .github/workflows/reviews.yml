name: Life Planner - reviews & sync

on:
  schedule:
    - cron: "0 17 * * 0"    # Sunday ~6pm London: weekly review
    - cron: "0 7 1 * *"     # 1st of month: monthly check-in
    - cron: "20 * * * *"    # hourly: Google Tasks -> Backlog inbox sync
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      TZ: Europe/London
      WHATSAPP_TOKEN: ${{ secrets.WHATSAPP_TOKEN }}
      PHONE_NUMBER_ID: ${{ secrets.PHONE_NUMBER_ID }}
      MY_NUMBER: ${{ secrets.MY_NUMBER }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GDRIVE_OAUTH_JSON: ${{ secrets.GDRIVE_OAUTH_JSON }}
      GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
      VAULT_DRIVE_FOLDER_ID: ${{ secrets.VAULT_DRIVE_FOLDER_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python scripts/gtasks_sync.py
      - run: python scripts/review.py auto
